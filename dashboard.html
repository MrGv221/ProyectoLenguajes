<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsistManager - Horario Semanal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header id="main-header">
        <nav class="navbar">
            <a href="#" class="logo">
                <i class="fa-regular fa-calendar-check"></i> AsistManager
            </a>
            <ul class="nav-links">
                <li>
                    <a href="./mis_clases.html" class="btn btn-gestion"
                        style="color: var(--texto-oscuro); text-decoration: none; font-weight: 700; margin-right: 1.5rem;">
                        <i class="fa-solid fa-folder-gear"></i> Mis Clases
                    </a>
                </li>
                <li>
                    <a href="#" id="btnCerrarSesion" class="btn btn-logout">
                        <i class="fa-solid fa-right-from-bracket"></i> Salir
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container schedule-container">
        
        <section class="schedule-header">
            <div>
                <h1 id="txtBienvenida">Cargando tu horario...</h1>
                <p id="txtFecha">Identificando el día de la semana...</p>
            </div>
            <a href="./gestionar_clase.html" class="btn btn-add-list" onclick="sessionStorage.removeItem('claseAEditar');">
                <i class="fa-solid fa-plus"></i> Nueva Clase
            </a>
        </section>

        <section class="schedule-grid">
            <div class="day-column" id="col-1">
                <div class="day-header">Lunes</div>
                <div class="classes-container"></div>
            </div>
            <div class="day-column" id="col-2">
                <div class="day-header">Martes</div>
                <div class="classes-container"></div>
            </div>
            <div class="day-column" id="col-3">
                <div class="day-header">Miércoles</div>
                <div class="classes-container"></div>
            </div>
            <div class="day-column" id="col-4">
                <div class="day-header">Jueves</div>
                <div class="classes-container"></div>
            </div>
            <div class="day-column" id="col-5">
                <div class="day-header">Viernes</div>
                <div class="classes-container"></div>
            </div>
        </section>
        
    </main>

    <script src="./js/dashboard.js"></script>
</body>
</html>
