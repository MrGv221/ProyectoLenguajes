<!DOCTYPE html>
<html lang="es-MX">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsistManager - Gestionar Clase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/448d4bfb94.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="manage-page" style="--color-materia: #9DB4C0;">
    <header id="main-header">
        <nav class="navbar">
            <a href="./mis_clases.html" class="logo"><i class="fa-solid fa-arrow-left"></i> Volver</a>
            <span id="txtEstadoPagina" style="font-weight: 800; color: var(--texto-oscuro);">NUEVA CLASE</span>
            <button id="btnGuardarTodo" class="btn btn-save-all"><i class="fa-solid fa-floppy-disk"></i> Guardar
                Todo</button>
        </nav>
    </header>

    <main class="container manage-grid">
        <section class="manage-card config-section">
            <h2><i class="fa-solid fa-gears"></i> Configuración de la Materia</h2>
            <form id="formGestionar">
                <div class="input-group">
                    <label>Nombre de la Clase</label>
                    <input type="text" id="inNombre" placeholder="Ej. Lenguajes de Internet" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Clave / Grupo</label>
                        <input type="text" id="inClave" placeholder="Ej. 502-V">
                    </div>
                    <div class="input-group">
                        <label>Aula</label>
                        <input type="text" id="inAula" placeholder="Ej. Laboratorio 3">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Hora Inicio</label>
                        <input type="time" id="inHoraInicio" required>
                    </div>
                    <div class="input-group">
                        <label>Hora Fin</label>
                        <input type="time" id="inHoraFin" required>
                    </div>
                </div>

                <label>Días de Clase</label>
                <div class="day-pills" id="selectorDias">
                    <button type="button" class="pill" data-dia="Lunes">L</button>
                    <button type="button" class="pill" data-dia="Martes">M</button>
                    <button type="button" class="pill" data-dia="Miércoles">Mi</button>
                    <button type="button" class="pill" data-dia="Jueves">J</button>
                    <button type="button" class="pill" data-dia="Viernes">V</button>
                </div>

                <label>Identidad Visual (Color e Ícono)</label>
                <div class="visual-pickers">
                    <div class="color-picker" id="pickerColores">
                    </div>
                    <div class="icon-picker" id="pickerIconos">
                    </div>
                </div>
            </form>
        </section>

        <section class="manage-card students-section" id="seccionAlumnos">
            <div class="overlay-lock" id="candadoAlumnos">
                <i class="fa-solid fa-lock"></i>
                <p>Guarda la materia para gestionar alumnos</p>
            </div>

            <h2><i class="fa-solid fa-users"></i> Matrícula de Alumnos</h2>

            <div class="add-student-box">
                <input type="text" id="inNombreAlumno" placeholder="Nombre completo">
                <input type="text" id="inMatricula" placeholder="Matrícula">
                <button id="btnAgregarAlumno" class="btn-add-mini"><i class="fa-solid fa-user-plus"></i></button>
            </div>

            <div class="table-container">
                <table id="tablaAlumnos" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="text-align: left; padding-bottom: 10px;">Nombre</th>
                            <th style="text-align: center; padding-bottom: 10px; width: 30%;">Matrícula</th>
                            <th style="text-align: right; padding-bottom: 10px; width: 10%;"></th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="./js/gestionar_clase.js"></script>
</body>

</html>
